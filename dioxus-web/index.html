<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOR Chat - Secure Messaging</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'dc-dark': '#1e1f22',
                        'dc-sidebar': '#2b2d31',
                        'dc-chat': '#313338',
                        'dc-input': '#383a40',
                        'dc-hover': '#35373c',
                        'dc-highlight': '#2e3035',
                        'dc-accent': '#5865f2',
                        'dc-text': '#dbdee1',
                        'dc-text-muted': '#949ba4',
                        'dc-text-faint': '#6d6f78',
                        'dc-border': '#3f4147',
                        'dc-green': '#23a55a',
                        'dc-accent-dim': '#4752c4',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'gg sans', 'Noto Sans', 'Helvetica Neue', Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            background: #313338;
        }

        #main {
            height: 100vh;
            width: 100vw;
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #1e1f22;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #18191c;
        }

        /* Highlight flash animation for pinned message scroll */
        @keyframes highlightFlash {
            0% { background-color: rgba(250, 204, 21, 0.15); }
            50% { background-color: rgba(250, 204, 21, 0.25); }
            100% { background-color: transparent; }
        }
        .highlight-flash {
            animation: highlightFlash 2s ease-out;
        }

        /* Hover action toolbar */
        .msg-row:hover .msg-actions {
            opacity: 1;
            pointer-events: auto;
        }
        .msg-actions {
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.1s ease;
        }

        /* Message hover bg */
        .msg-row:hover {
            background-color: #2e3035;
        }

        /* Aspect ratio for YouTube embeds */
        .aspect-video {
            aspect-ratio: 16 / 9;
        }

        /* Accent glow for empty state icon */
        .accent-glow {
            box-shadow: 0 0 40px rgba(88, 101, 242, 0.3), 0 0 80px rgba(88, 101, 242, 0.1);
        }
    </style>
</head>
<body>
    <div id="main"></div>
</body>
</html>
